name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      # Served from the custom domain docs.floruntime.io (see public/CNAME),
      # so the site builds at the root path — no MARKLINE_BASE_PATH needed.
      # MARKLINE_AI_KEY (an OpenRouter key, same as the Ask AI Worker) lets the
      # build pre-generate Ask AI suggestions; it's skipped gracefully if unset.
      - run: npx markline export
        env:
          MARKLINE_AI_KEY: ${{ secrets.MARKLINE_AI_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
